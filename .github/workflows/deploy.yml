name: Sync

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # fetch full history so remark-modified-time can read git lastmod dates
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack and setup pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Public (non-secret) build-time config, validated by astro:env.
          # Define these as repository Variables:
          #   Settings → Secrets and variables → Actions → Variables.
          # A missing required value fails the build fast (astro:env).
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_ARTALK_SERVER: ${{ vars.PUBLIC_ARTALK_SERVER }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # All connection parameters are provided via repository Secrets:
          #   Settings → Secrets and variables → Actions → Secrets.
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ${{ secrets.FTP_PROTOCOL }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
