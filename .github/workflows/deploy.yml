name: Sync

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # fetch full history so remark-modified-time can read git lastmod dates
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack and setup pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Public (non-secret) build-time config, validated by astro:env.
          # Define these as repository Variables:
          #   Settings → Secrets and variables → Actions → Variables.
          # A missing required value fails the build fast (astro:env).
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_ARTALK_SERVER: ${{ vars.PUBLIC_ARTALK_SERVER }}

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # All connection parameters are provided via repository Secrets:
          #   Settings → Secrets and variables → Actions → Secrets.
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ${{ secrets.FTP_PROTOCOL }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/

      # Normalize the site origin to exactly one trailing slash so the directory
      # refresh below targets the site root regardless of how PUBLIC_SITE_URL is
      # stored (with or without a trailing slash). A double slash would address a
      # different path and miss the cache.
      - name: Normalize site URL
        id: site
        run: |
          base="${{ vars.PUBLIC_SITE_URL }}"
          echo "root=${base%/}/" >> "$GITHUB_OUTPUT"

      # Purge the DogeCloud CDN edge cache after a successful deploy. A `path`
      # refresh on the site root recursively invalidates every cached file, so a
      # single entry covers the whole site (and stays within the daily quota).
      # Requires repository Secrets DOGECLOUD_ACCESS_KEY / DOGECLOUD_SECRET_KEY
      # (Console → 用户中心 → 密钥管理). Pinned to a commit SHA for supply-chain safety.
      - name: Refresh DogeCloud CDN cache
        uses: seatonjiang/dogecloud-cdn-action@c8b84d5e99199aa1514e2f3b1e35c476a3f4809e # 2025.12.10
        with:
          access_key: ${{ secrets.DOGECLOUD_ACCESS_KEY }}
          secret_key: ${{ secrets.DOGECLOUD_SECRET_KEY }}
          type: "path"
          urls:
            - ${{ steps.site.outputs.root }}
